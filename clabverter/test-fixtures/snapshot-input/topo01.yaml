---
apiVersion: clabernetes.containerlab.dev/v1alpha1
kind: Topology
metadata:
  name: topo01
  namespace: notclabernetes
spec:
  deployment:
    filesFromConfigMap:
      srl1:
      - filePath: srl1.cfg
        configMapName: topo01-snapshot
        configMapPath: srl1__checkpoint-0.json
        mode: read
      - filePath: taco/srl1.license
        configMapName: topo01-srl1-files
        configMapPath: taco-srl1.license
        mode: read
      srl2:
      - filePath: srl2.cfg
        configMapName: topo01-snapshot
        configMapPath: srl2__running-config.cfg
        mode: read
      - filePath: srl2.license
        configMapName: topo01-srl2-files
        configMapPath: srl2.license
        mode: read
      sros1:
      - filePath: /clabernetes/config.txt
        configMapName: topo01-snapshot
        configMapPath: sros1__config.txt
        mode: read
      - filePath: taco/srl1.license
        configMapName: topo01-sros1-files
        configMapPath: taco-srl1.license
        mode: read
      sros2:
      - filePath: srl2.license
        configMapName: topo01-sros2-files
        configMapPath: srl2.license
        mode: read
    persistence:
      enabled: false
    scheduling: {}
  expose:
    disableAutoExpose: false
    disableExpose: false
  imagePull:
    insecureRegistries:
    - 1.2.3.4
    pullSecrets:
    - regcred
  naming: prefixed
  definition:
    containerlab: |-
      name: topo01

      topology:
        kinds:
          nokia_sros:
            license: srl2.license
        nodes:
          srl1:
            kind: srl
            image: ghcr.io/nokia/srlinux
            startup-config: srl1.cfg
            license: taco/srl1.license
          srl2:
            kind: srl
            image: ghcr.io/nokia/srlinux
            startup-config: srl2.cfg
            license: srl2.license
            binds:
              - __clabDir__/potato.txt:/potato.txt
              - __clabNodeDir__/potato.txt:/nodedir-potato.txt
          sros1:
            kind: nokia_sros
            image: nokia_sros:latest
            license: taco/srl1.license
          sros2:
            kind: nokia_sros
            image: nokia_sros:latest
            healthcheck:
              start-period: 5
              interval: 1
              test:
                - CMD-SHELL
                - cat /etc/os-release

        links:
          - endpoints: ["srl1:e1-1", "srl2:e1-1"]
