---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: snapshots.clabernetes.containerlab.dev
spec:
  group: clabernetes.containerlab.dev
  names:
    kind: Snapshot
    listKind: SnapshotList
    plural: snapshots
    singular: snapshot
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.topologyRef
      name: Topology
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    - jsonPath: .status.configMapRef
      name: ConfigMap
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Snapshot is an object that represents a saved configuration snapshot for a Topology.
          A Snapshot is created when the clabernetes/snapshotRequested annotation is set on a Topology,
          and it stores the running configurations of all nodes in a backing ConfigMap.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SnapshotSpec is the spec for a Snapshot resource.
            properties:
              topologyNamespace:
                description: TopologyNamespace is the namespace of the referenced
                  Topology.
                type: string
              topologyRef:
                description: TopologyRef is the name of the Topology to snapshot.
                type: string
            required:
            - topologyRef
            type: object
          status:
            description: SnapshotStatus is the status for a Snapshot resource.
            properties:
              configMapRef:
                description: ConfigMapRef is the name of the ConfigMap holding saved
                  node configs.
                type: string
              message:
                description: Message holds any error or informational message.
                type: string
              nodeConfigs:
                additionalProperties:
                  items:
                    type: string
                  type: array
                description: NodeConfigs maps node name to list of saved file paths
                  stored in the ConfigMap.
                type: object
              phase:
                description: 'Phase is the current lifecycle phase: Pending, Running,
                  Completed, Failed.'
                type: string
              timestamp:
                description: Timestamp is when the snapshot was completed (RFC3339
                  format).
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources: {}
